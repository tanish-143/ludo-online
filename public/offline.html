<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ludo Offline - Local Multiplayer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- Parchment texture overlays -->
  <div class="noise"></div>
  <div class="stains"></div>
  <div class="vignette"></div>

  <!-- ========== PLAYER SELECT ========== -->
  <main class="scene" id="select-panel">
    <div class="lobby-card">
      <h1 class="lobby-title">Ludo Offline</h1>
      <p class="lobby-subtitle">Play locally on one device</p>

      <div class="player-select-grid">
        <button class="btn-player-count" data-count="2" type="button">
          <span class="pcount-num">2</span>
          <span class="pcount-label">Players</span>
          <span class="pcount-colors">
            <span class="pcount-dot" style="background:#c62828"></span>
            <span class="pcount-dot" style="background:#2f8f4e"></span>
          </span>
        </button>
        <button class="btn-player-count" data-count="3" type="button">
          <span class="pcount-num">3</span>
          <span class="pcount-label">Players</span>
          <span class="pcount-colors">
            <span class="pcount-dot" style="background:#c62828"></span>
            <span class="pcount-dot" style="background:#2f8f4e"></span>
            <span class="pcount-dot" style="background:#d99a1b"></span>
          </span>
        </button>
        <button class="btn-player-count" data-count="4" type="button">
          <span class="pcount-num">4</span>
          <span class="pcount-label">Players</span>
          <span class="pcount-colors">
            <span class="pcount-dot" style="background:#c62828"></span>
            <span class="pcount-dot" style="background:#2f8f4e"></span>
            <span class="pcount-dot" style="background:#d99a1b"></span>
            <span class="pcount-dot" style="background:#1f52c2"></span>
          </span>
        </button>
      </div>

      <div class="divider"><span>or</span></div>

      <a href="/" class="btn btn-secondary btn-block" style="text-decoration:none;text-align:center;">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Play Online
      </a>
    </div>
  </main>

  <!-- ========== GAME VIEW ========== -->
  <main class="scene hidden" id="game-panel">
    <div class="game-body">
      <!-- Board area -->
      <div class="board-area">
        <canvas id="board" width="720" height="720"></canvas>

        <!-- Player cards overlay on board corners -->
        <div id="board-player-cards" class="board-player-cards"></div>

        <!-- Current turn player indicator -->
        <div id="current-turn-bar" class="turn-bar">
          <span id="turn-status" class="turn-text">Waiting...</span>
        </div>

        <!-- Floating emoji container -->
        <div id="emoji-float-container" class="emoji-float-container"></div>
      </div>

      <!-- Side panel -->
      <aside class="side-panel">
        <!-- Players section -->
        <div class="sp-section">
          <h3 class="sp-title">Players</h3>
          <ul id="players-list" class="players-list"></ul>
        </div>

        <!-- Game Controls section -->
        <div class="sp-section">
          <h3 class="sp-title">Game Controls</h3>
          <div class="controls-stack">
            <button id="game-settings-btn" class="btn btn-control btn-settings" type="button">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              Game Settings
            </button>

            <button id="sound-btn" class="btn btn-control btn-mute" type="button">
              <svg id="sound-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
              Mute Sound
            </button>

            <button id="restart-btn" class="btn btn-control btn-leave" type="button">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
              Restart Game
            </button>

            <button id="exit-btn" class="btn btn-control btn-leave" type="button">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Back to Menu
            </button>
          </div>
        </div>

        <!-- Winners (shown during/after game) -->
        <div class="sp-section" id="winners-section">
          <h3 class="sp-title">Winners</h3>
          <ol id="winners-list" class="winners-list"></ol>
        </div>

        <!-- Activity log -->
        <div class="sp-section sp-section-log" id="log-section">
          <h3 class="sp-title">Activity</h3>
          <ul id="log-list" class="log-list"></ul>
        </div>

        <p id="board-tip" class="board-tip"></p>
      </aside>
    </div>

    <!-- In-game rules overlay -->
    <div id="ingame-rules-overlay" class="ingame-rules-overlay hidden">
      <div class="ingame-rules-card">
        <div class="ingame-rules-header">
          <h2 class="ingame-rules-title">Game Settings</h2>
          <button id="ingame-rules-close" class="ingame-rules-close" type="button">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div id="ingame-rules-list" class="rules-list"></div>
        <button id="ingame-rules-done" class="btn btn-rules-done btn-block" type="button">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Done
        </button>
      </div>
    </div>
  </main>

  <script src="/offline.js" defer></script>
</body>
</html>
