<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ludo Online</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>🎲 Ludo</h1>
      <div id="turn-indicator">Red's Turn</div>
    </header>

    <div id="main-layout">
      <!-- Left panels: Red & Blue -->
      <div id="left-panels">
        <div class="player-panel" id="panel-red">
          <div class="panel-color-bar bar-red"></div>
          <div class="panel-body">
            <div class="panel-name">Red</div>
            <div class="panel-tokens"></div>
            <div class="player-score">0/4 home</div>
            <div class="progress-bar"><div class="progress-bar-fill fill-red"></div></div>
          </div>
        </div>
        <div class="player-panel" id="panel-blue">
          <div class="panel-color-bar bar-blue"></div>
          <div class="panel-body">
            <div class="panel-name">Blue</div>
            <div class="panel-tokens"></div>
            <div class="player-score">0/4 home</div>
            <div class="progress-bar"><div class="progress-bar-fill fill-blue"></div></div>
          </div>
        </div>
      </div>

      <!-- Board -->
      <div id="board-wrap">
        <div id="board"></div>
        <div id="game-message"></div>
      </div>

      <!-- Right panels: Green & Yellow -->
      <div id="right-panels">
        <div class="player-panel" id="panel-green">
          <div class="panel-color-bar bar-green"></div>
          <div class="panel-body">
            <div class="panel-name">Green</div>
            <div class="panel-tokens"></div>
            <div class="player-score">0/4 home</div>
            <div class="progress-bar"><div class="progress-bar-fill fill-green"></div></div>
          </div>
        </div>
        <div class="player-panel" id="panel-yellow">
          <div class="panel-color-bar bar-yellow"></div>
          <div class="panel-body">
            <div class="panel-name">Yellow</div>
            <div class="panel-tokens"></div>
            <div class="player-score">0/4 home</div>
            <div class="progress-bar"><div class="progress-bar-fill fill-yellow"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Dice area -->
    <div id="dice-area">
      <div id="dice" data-value="1"></div>
      <button id="roll-btn">Roll Dice</button>
    </div>

    <!-- Winner overlay -->
    <div id="winner-overlay" style="display:none">
      <div id="winner-box">
        <div id="winner-message">Winner!</div>
        <button id="new-game-btn">Play Again</button>
      </div>
    </div>
  </div>

  <script src="js/game.js"></script>
  <script src="js/dice.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
